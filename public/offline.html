<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f59e0b" />
    <title>Purrney Offline</title>
    <style>
      :root {
        color: #2d3748;
        background: #fff7ed;
        font-family: Arial, sans-serif;
      }

      body {
        align-items: center;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      main {
        background: #fffbeb;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(45, 55, 72, 0.12);
        max-width: 420px;
        padding: 24px;
        text-align: center;
      }

      .mark {
        align-items: center;
        background: #f59e0b;
        border-radius: 999px;
        display: inline-flex;
        font-size: 36px;
        font-weight: 800;
        height: 72px;
        justify-content: center;
        margin-bottom: 16px;
        width: 72px;
      }

      h1 {
        font-size: 24px;
        margin: 0 0 8px;
      }

      p {
        color: rgba(45, 55, 72, 0.72);
        line-height: 1.5;
        margin: 0 0 16px;
      }

      a {
        color: #f59e0b;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">P</div>
      <h1>You are offline</h1>
      <p>Purrney can open its cached app shell, but spreadsheet data needs an internet connection.</p>
      <a href="/">Try opening Purrney again</a>
    </main>
  </body>
</html>
